meta:
  name: File Rename
  description: atom=file + recurse=true + per-unit — rename every file copy and write a summary.
  version: "1.0.0"
atom: file
scope: 1
recurse: true
steps:
  - module: verify-rename-path
    name: Rename File
    params:
      prefix: ""
      suffix: "_renamed"
  - module: verify-write-summary
    name: Write Summary
    params:
      filename: "renames-summary.txt"
      title: "Rename Report"