meta:
  name: Folder Rename Example
  description: Rename a folder copy and generate a summary.
  version: "1.0.0"
mode: folder
steps:
  - module: rename-path
    name: Rename Folder
    params:
      prefix: "packaged-"
      suffix: ""
  - module: write-summary
    name: Generate Summary
    params:
      filename: "folder-workflow-summary.txt"
      title: "Folder Workflow Report"
