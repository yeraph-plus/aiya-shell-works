meta:
  name: Folder Rename
  description: atom=folder + per-unit — folder passed as one unit, prefix-renamed.
  version: "1.0.0"
atom: folder
scope: 1
steps:
  - module: verify-rename-path
    name: Rename Folder
    params:
      prefix: "pkg-"
      suffix: ""
  - module: verify-write-summary
    name: Write Summary
    params:
      filename: "folder-summary.txt"
      title: "Folder Rename Report"