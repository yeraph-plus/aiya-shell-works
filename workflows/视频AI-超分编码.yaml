meta:
  name: "视频AI处理 - 超分编码"
  description: "ML 超分 → FFmpeg 编码 (仅超分处理)"
  version: "1.0.0"
mode: file
steps:
  - module: vs-super-resolution
    name: "ML 超分"
    params:
      model: "RealESRGAN_x4plus"
      scale_factor: "2x"
      output_format: "y4m"
      gpu: true

  - module: ffmpeg-compose
    name: "编码合成"
    params:
      encoder: "libx264"
      preset: "medium"
      crf: 18
      output_container: "mp4"
